<!DOCTYPE html>
<html lang="sv">
<head>
  <title>Secure Chat</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="/manifest.json">
</head>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0f0f0f;
      color: white;
    }

    #login, #chat {
      display: none;
      padding: 20px;
    }

    #chatBox {
      height: 70vh;
      overflow-y: auto;
      border: 1px solid #333;
      padding: 10px;
      margin-bottom: 10px;
    }

    input, button {
      padding: 10px;
      margin: 5px;
    }

    .msg {
      padding: 5px;
      margin: 5px 0;
      background: #1c1c1c;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Login</h2>
  <input id="username" placeholder="Användarnamn" />
  <input id="password" type="password" placeholder="Lösenord" />
  <button onclick="login()">Logga in</button>
</div>

<!-- CHAT -->
<div id="chat">
  <h2>Secure Chat</h2>

  <input id="room" placeholder="Rum namn" />
  <button onclick="joinRoom()">Gå med</button>

  <div id="chatBox"></div>

  <input id="message" placeholder="Meddelande" />
  <button onclick="sendMessage()">Skicka</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="crypto.js"></script>
<script src="ui.js"></script>
<script src="app.js"></script>

</body>
</html>
