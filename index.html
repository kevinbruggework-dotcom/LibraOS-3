<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">

<title>LibraOS</title>

<style>
body{
  margin:0;
  font-family:-apple-system,system-ui;
  background:#0f0f10;
  color:#fff;
}

.tabbar{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#1a1a1c;
}

.tab{
  flex:1;
  padding:12px;
  text-align:center;
  color:#aaa;
}

.tab.active{color:#2d84eb;}

.view{display:none;padding:16px;}
.view.active{display:block;}

.btn{
  background:#2d84eb;
  border:none;
  padding:10px;
  color:#fff;
  border-radius:8px;
}

.input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  background:#1a1a1c;
  border:1px solid #333;
  color:#fff;
}
</style>
</head>

<body>

<!-- CONTACTS -->
<div id="contacts" class="view active">
  <h2>Kontakter</h2>
  <input id="addId" class="input" placeholder="Kontakt-ID">
  <button class="btn" onclick="sendRequest()">Lägg till</button>

  <div id="contactList"></div>
</div>

<!-- CHATS -->
<div id="chats" class="view">
  <h2>Chattar</h2>
  <div id="chatList"></div>
</div>

<!-- PROFILE -->
<div id="profile" class="view">
  <h2>Profil</h2>
  <div id="myId"></div>
  <button class="btn" onclick="resetAccount()">Radera konto</button>
</div>

<!-- NAV -->
<div class="tabbar">
  <div class="tab active" onclick="nav('contacts',this)">Kontakter</div>
  <div class="tab" onclick="nav('chats',this)">Chattar</div>
  <div class="tab" onclick="nav('profile',this)">Profil</div>
</div>

<script src="app.js"></script>
</body>
</html>
